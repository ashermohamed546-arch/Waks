<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator - Waks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="bi bi-lightning-charge"></i> Waks</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/calculator">Calculator</a></li>
                    <li class="nav-item"><a class="nav-link" href="/mobile-money">Mobile Money</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <h2 class="mb-4">Bitcoin Calculator</h2>
        
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Convert BTC to Fiat</h5>
                    </div>
                    <div class="card-body">
                        <form id="converterForm">
                            <div class="mb-3">
                                <label class="form-label">Bitcoin Amount</label>
                                <input type="number" class="form-control" id="btcAmount" placeholder="0.5" step="0.00000001" value="1" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Currency</label>
                                <select class="form-control" id="currency" required>
                                    <option value="USD">USD - US Dollar</option>
                                    <option value="EUR">EUR - Euro</option>
                                    <option value="GBP">GBP - British Pound</option>
                                    <option value="UGX" selected>UGX - Ugandan Shilling 🇺🇬</option>
                                    <option value="KES">KES - Kenyan Shilling 🇰🇪</option>
                                    <option value="GHS">GHS - Ghanaian Cedi 🇬🇭</option>
                                    <option value="NGN">NGN - Nigerian Naira 🇳🇬</option>
                                    <option value="EGP">EGP - Egyptian Pound 🇪🇬</option>
                                    <option value="JPY">JPY - Japanese Yen</option>
                                    <option value="AUD">AUD - Australian Dollar</option>
                                    <option value="CAD">CAD - Canadian Dollar</option>
                                    <option value="CHF">CHF - Swiss Franc</option>
                                    <option value="CNY">CNY - Chinese Yuan</option>
                                    <option value="INR">INR - Indian Rupee</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-calculator"></i> Convert
                            </button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Result</h5>
                    </div>
                    <div class="card-body" id="resultArea">
                        <p class="text-muted">Enter amount and click Convert</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-5">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Profit Calculator</h5>
                    </div>
                    <div class="card-body">
                        <form id="profitForm">
                            <div class="mb-3">
                                <label class="form-label">BTC Mined</label>
                                <input type="number" class="form-control" id="btcMined" placeholder="0.5" step="0.00000001" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Electricity Cost ($)</label>
                                <input type="number" class="form-control" id="electricityCost" placeholder="0" step="0.01" value="0">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Hardware Cost ($)</label>
                                <input type="number" class="form-control" id="hardwareCost" placeholder="0" step="0.01" value="0">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-calculator"></i> Calculate Profit
                            </button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Profit Results</h5>
                    </div>
                    <div class="card-body" id="profitResult">
                        <p class="text-muted">Fill in the form to calculate</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // BTC to Fiat Converter
        document.getElementById('converterForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btc = parseFloat(document.getElementById('btcAmount').value);
            const currency = document.getElementById('currency').value;
            
            try {
                const response = await fetch(`/api/calculator/convert?btc=${btc}&currency=${currency}`);
                const data = await response.json();
                
                if (data.status === 'ok') {
                    const result = data.data;
                    document.getElementById('resultArea').innerHTML = `
                        <div class="mb-3">
                            <small class="text-muted">Amount</small>
                            <div style="font-size: 28px; font-weight: bold; color: #f7931a;">
                                ${result.formatted}
                            </div>
                        </div>
                        <div class="mb-3">
                            <small class="text-muted">Exchange Rate</small>
                            <div>1 BTC = ${result.rate.toLocaleString()} ${currency}</div>
                        </div>
                        <div>
                            <small class="text-muted">Updated</small>
                            <div>${new Date(result.timestamp).toLocaleString()}</div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('resultArea').innerHTML = '<p class="text-danger">Error fetching conversion</p>';
            }
        });
        
        // Profit Calculator
        document.getElementById('profitForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btcMined = parseFloat(document.getElementById('btcMined').value);
            const electricityCost = parseFloat(document.getElementById('electricityCost').value);
            const hardwareCost = parseFloat(document.getElementById('hardwareCost').value);
            
            try {
                const response = await fetch('/api/calculator/profit', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        btc_mined: btcMined,
                        currency: 'USD',
                        electricity_cost: electricityCost,
                        hardware_cost: hardwareCost
                    })
                });
                
                const data = await response.json();
                if (data.status === 'ok') {
                    const profit = data.data;
                    document.getElementById('profitResult').innerHTML = `
                        <div class="mb-2">
                            <small class="text-muted">BTC Value</small>
                            <div style="font-size: 24px; font-weight: bold;">$${profit.btc_value.toFixed(2)}</div>
                        </div>
                        <div class="mb-2">
                            <small class="text-muted">Gross Profit</small>
                            <div>$${profit.gross_profit.toFixed(2)}</div>
                        </div>
                        <div class="mb-2">
                            <small class="text-muted">Net Profit</small>
                            <div style="color: #28a745; font-weight: bold;">$${profit.net_profit.toFixed(2)}</div>
                        </div>
                        <div>
                            <small class="text-muted">ROI</small>
                            <div>${profit.roi_percent.toFixed(2)}%</div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
