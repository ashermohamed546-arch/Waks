<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Money - Waks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="bi bi-lightning-charge"></i> Waks</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/calculator">Calculator</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/mobile-money">Mobile Money</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <h2 class="mb-4"><i class="bi bi-phone"></i> Mobile Money Transfer</h2>
        
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Send to Mobile Wallet</h5>
                    </div>
                    <div class="card-body">
                        <form id="mobileMoneyForm">
                            <div class="mb-3">
                                <label class="form-label">Bitcoin Amount</label>
                                <input type="number" class="form-control" id="transferBtc" placeholder="0.1" step="0.00000001" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Provider</label>
                                <select class="form-control" id="provider" required onchange="updateCurrencies()">
                                    <option value="">Select Provider...</option>
                                    <option value="MTN">MTN Mobile Money (Uganda, Ghana, Kenya, Nigeria)</option>
                                    <option value="AIRTEL">Airtel Money (Uganda, Kenya, Tanzania, Nigeria)</option>
                                    <option value="UGANDA_TELECOM">Uganda Telecom Money (Uganda)</option>
                                    <option value="ORANGE">Orange Money (Egypt, Ivory Coast)</option>
                                    <option value="VODAFONE">Vodafone Cash (Ghana, Egypt)</option>
                                    <option value="SAFARICOM">Safaricom M-Pesa (Kenya, Tanzania)</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Currency</label>
                                <select class="form-control" id="mmCurrency" required>
                                    <option value="">Select Currency...</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Phone Number</label>
                                <input type="tel" class="form-control" id="phoneNumber" placeholder="+256700000000" required>
                                <small class="text-muted">Include country code (e.g., +256 for Uganda)</small>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-send"></i> Send Transfer
                            </button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Transfer Summary</h5>
                    </div>
                    <div class="card-body" id="transferSummary">
                        <p class="text-muted">Fill in the form to see details</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-5">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Transfer History</h5>
                    </div>
                    <div class="card-body" id="transferHistory">
                        <p class="text-muted">No transfers yet</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const providerCurrencies = {
            'MTN': ['UGX', 'GHS', 'NGN'],
            'AIRTEL': ['UGX', 'KES', 'NGN'],
            'UGANDA_TELECOM': ['UGX'],
            'ORANGE': ['EGP'],
            'VODAFONE': ['GHS', 'EGP'],
            'SAFARICOM': ['KES']
        };
        
        function updateCurrencies() {
            const provider = document.getElementById('provider').value;
            const currencies = providerCurrencies[provider] || [];
            const currencySelect = document.getElementById('mmCurrency');
            
            currencySelect.innerHTML = '<option value="">Select Currency...</option>';
            currencies.forEach(curr => {
                const option = document.createElement('option');
                option.value = curr;
                option.textContent = curr;
                currencySelect.appendChild(option);
            });
        }
        
        document.getElementById('mobileMoneyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btc = parseFloat(document.getElementById('transferBtc').value);
            const provider = document.getElementById('provider').value;
            const currency = document.getElementById('mmCurrency').value;
            const phone = document.getElementById('phoneNumber').value;
            
            try {
                const response = await fetch('/api/mobile-money/transfer', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        btc, provider, currency, phone
                    })
                });
                
                const data = await response.json();
                if (data.status === 'ok') {
                    const details = data.data.details;
                    document.getElementById('transferSummary').innerHTML = `
                        <div class="alert alert-success mb-3">
                            <i class="bi bi-check-circle"></i> Transfer initiated!
                            <br><strong>ID: ${data.data.transaction_id}</strong>
                        </div>
                        <div class="mb-2">
                            <small class="text-muted">Amount to Send</small>
                            <div style="font-size: 24px; font-weight: bold;">${details.net_amount} ${details.currency}</div>
                        </div>
                        <div class="mb-2">
                            <small class="text-muted">Fee (${details.fee_rate})</small>
                            <div>${details.fee_amount} ${details.currency}</div>
                        </div>
                        <div class="mb-2">
                            <small class="text-muted">Total Deducted</small>
                            <div>${details.fiat_amount} ${details.currency}</div>
                        </div>
                    `;
                    loadHistory();
                } else {
                    document.getElementById('transferSummary').innerHTML = `<p class="text-danger">Error: ${data.error}</p>`;
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('transferSummary').innerHTML = '<p class="text-danger">Transfer failed</p>';
            }
        });
        
        async function loadHistory() {
            try {
                const response = await fetch('/api/mobile-money/history');
                const data = await response.json();
                
                if (data.status === 'ok' && data.data.length > 0) {
                    let html = '<table class="table table-sm"><thead><tr><th>ID</th><th>Amount</th><th>Provider</th><th>Status</th></tr></thead><tbody>';
                    data.data.forEach(tx => {
                        const statusBadge = tx.status === 'confirmed' ? 'success' : 'pending';
                        html += `
                            <tr>
                                <td><small>${tx.id}</small></td>
                                <td>${tx.net_amount} ${tx.currency}</td>
                                <td>${tx.provider}</td>
                                <td><span class="badge badge-${statusBadge}">${tx.status}</span></td>
                            </tr>
                        `;
                    });
                    html += '</tbody></table>';
                    document.getElementById('transferHistory').innerHTML = html;
                }
            } catch (error) {
                console.error('Error loading history:', error);
            }
        }
        
        loadHistory();
    </script>
</body>
</html>
